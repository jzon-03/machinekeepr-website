<a class="skip-link" href="#main-content">Skip to main content</a>

<header class="site-header" aria-label="Primary">
  <div class="header-inner">
    <a class="brand" routerLink="/" aria-label="MachineKeepr home">
      <span class="brand-logo-shell" aria-hidden="true">
        <img
          class="brand-logo"
          [ngSrc]="'machinekeepr.svg'"
          width="164"
          height="32"
          alt=""
          aria-hidden="true"
          priority
        />
      </span>
      <span class="brand-text">MachineKeepr</span>
    </a>

    <nav class="main-nav" aria-label="Main navigation">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/product" routerLinkActive="active">Product</a>
      <a routerLink="/use-cases" routerLinkActive="active">Use Cases</a>
      <a routerLink="/pricing" routerLinkActive="active">Pricing</a>
      <a routerLink="/docs" routerLinkActive="active">Docs</a>
      <a routerLink="/contact" routerLinkActive="active">Contact</a>
    </nav>
  </div>
</header>

<main id="main-content" class="site-main">
  <router-outlet></router-outlet>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <ul class="footer-list">
      <li>© 2026 MachineKeepr. On-prem machine operations platform.</li>
      <li>
        A Sharp Floor NC LLC Company —
        <a href="https://sharpfloornc.com" target="_blank" rel="noopener noreferrer">sharpfloornc.com</a>
      </li>
    </ul>
  </div>
</footer>
